<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
    }

    .calculator{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      padding:25px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.2);
    }

    #display{
      width:100%;
      height:80px;
      border:none;
      outline:none;
      border-radius:15px;
      margin-bottom:20px;
      padding:15px;
      font-size:38px;
      text-align:right;
      background:rgba(255,255,255,0.15);
      color:white;
      box-shadow:inset 0 0 10px rgba(0,0,0,0.3);
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,75px);
      gap:15px;
    }

    button{
      height:70px;
      border:none;
      border-radius:18px;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      color:white;
      background:linear-gradient(145deg,#1f6feb,#0b4dbf);
      box-shadow:5px 5px 10px rgba(0,0,0,0.4),
                 -3px -3px 8px rgba(255,255,255,0.1);
    }

    button:hover{
      transform:scale(1.08);
      background:linear-gradient(145deg,#4da3ff,#1565c0);
    }

    .operator{
      background:linear-gradient(145deg,#ff9800,#ff5722);
    }

    .operator:hover{
      background:linear-gradient(145deg,#ffb74d,#ff7043);
    }

    .equal{
      background:linear-gradient(145deg,#00c853,#009624);
    }

    .equal:hover{
      background:linear-gradient(145deg,#4caf50,#2e7d32);
    }

    .clear{
      background:linear-gradient(145deg,#e53935,#b71c1c);
    }

    .clear:hover{
      background:linear-gradient(145deg,#ef5350,#c62828);
    }

  </style>
</head>

<body>

  <div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="appendValue('*')">×</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('.')">.</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button style="grid-column: span 4;" onclick="appendValue('0')">0</button>

    </div>

  </div>

  <script>

    let display = document.getElementById("display");

    function appendValue(value){
      display.value += value;
    }

    function clearDisplay(){
      display.value = "";
    }

    function calculate(){
      try{
        display.value = eval(display.value);
      }
      catch{
        display.value = "Error";
      }
    }

  </script>

</body>
</html>
